name: NF doc-alerts

on:
  push:
    branches-ignore:
      - gh-pages
    paths:
      - 'website/**'
      - 'docs/**'
  deployment_status:

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Post push to Mattermost doc-alerts
        env:
          WEBHOOK: ${{ secrets.MATTERMOST_DOC_ALERTS_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -1)
          TEXT=$(printf '📤 **Push** to `%s` / `%s` by @%s\n> %s\n[View commit](%s/%s/commit/%s) | [Compare](%s)' \
            "$REPO" "$BRANCH" "$ACTOR" "$FIRST_LINE" "$SERVER_URL" "$REPO" "$SHA" "$COMPARE_URL")
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -s -X POST "$WEBHOOK" -H 'Content-Type: application/json' -d @-

  notify-vercel-preview:
    if: |
      github.event_name == 'deployment_status'
      && github.event.deployment_status.state == 'success'
      && github.event.deployment_status.creator.login == 'vercel[bot]'
      && startsWith(github.event.deployment_status.environment, 'Preview')
    runs-on: ubuntu-latest
    steps:
      - name: Post Vercel preview to Mattermost doc-alerts
        env:
          WEBHOOK: ${{ secrets.MATTERMOST_DOC_ALERTS_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.deployment.ref }}
          PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          TEXT=$(printf '🔍 **Vercel preview ready** — `%s` / `%s`\n[Open preview](%s)' \
            "$REPO" "$BRANCH" "$PREVIEW_URL")
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -s -X POST "$WEBHOOK" -H 'Content-Type: application/json' -d @-
